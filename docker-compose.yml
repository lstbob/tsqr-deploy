services:
  postgres:
    image: postgres:16
    container_name: tsqr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Bind to loopback only so the database is reachable from host-based admin
    # tools but NOT from the wider network. App services reach it over tsqr-net.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - tsqr-net

  tool-lib:
    build:
      context: ../tsqr-tool-lib
      dockerfile: Dockerfile
    container_name: tsqr-tool-lib
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${TOOL_LIB_CONNECTION}
      # Shared symmetric signing key — MUST match the gateway's key.
      Jwt__Key: ${JWT_KEY}
    security_opt:
      - no-new-privileges:true
    networks:
      - tsqr-net

  gateway:
    build:
      context: ../tsqr-gateway
      dockerfile: Dockerfile
    container_name: tsqr-gateway
    ports:
      - "5000:8080"
    depends_on:
      - tool-lib
      - ui
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      Jwt__Key: ${JWT_KEY}
    security_opt:
      - no-new-privileges:true
    networks:
      - tsqr-net

  ui:
    build:
      context: ../tsqr-ui
      dockerfile: Dockerfile
    container_name: tsqr-ui
    depends_on:
      - gateway
    environment:
      API_URL: "http://gateway:8080"
    security_opt:
      - no-new-privileges:true
    networks:
      - tsqr-net

  support:
    build:
      context: ../tsqr-support
      dockerfile: Dockerfile
    container_name: tsqr-support
    ports:
      - "4200:80"
    security_opt:
      - no-new-privileges:true
    networks:
      - tsqr-net

volumes:
  pgdata:

networks:
  tsqr-net:
    driver: bridge
